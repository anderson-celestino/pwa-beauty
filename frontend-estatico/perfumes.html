<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfumes e Fragrâncias - Beauty Cosmetics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #d81b60; 
            --text-pink: #e91e63;    
            --light-pink: #f48fb1;   
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --gray-border: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #ffffff;
            color: var(--text-pink);
            overflow-x: hidden;
        }

      
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            background-color: #ffffff;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-pink);
            text-decoration: none;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        nav a {
            text-decoration: none;
            color: var(--primary-pink);
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        nav a:hover {
            opacity: 0.8;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: 15px;
        }

        .icon-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .nav-icons svg {
            width: 22px;
            height: 22px;
            fill: var(--primary-pink);
            transition: transform 0.2s;
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background-color: #ff4081;
            color: white;
            font-size: 11px;
            font-weight: 700;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            padding: 40px 8% 100px 8%;
            max-width: 1400px;
            margin: 0 auto;
        }

    
        .breadcrumbs {
            font-size: 13px;
            margin-bottom: 25px;
            color: var(--light-pink);
        }

        .breadcrumbs a {
            color: var(--light-pink);
            text-decoration: none;
        }

        .breadcrumbs a:hover {
            text-decoration: underline;
        }

          .category-title {
            font-family: var(--font-serif);
            font-size: 44px;
            color: var(--primary-pink);
            font-weight: 400;
            margin-bottom: 35px;
        }

       
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .results-count {
            font-size: 14px;
            color: var(--light-pink);
        }

        .sort-select {
            font-family: var(--font-sans);
            font-size: 14px;
            color: #333333;
            padding: 6px 12px;
            border: 1px solid var(--gray-border);
            border-radius: 4px;
            background-color: #ffffff;
            cursor: pointer;
            outline: none;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 30px;
        }

        .product-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-image-container {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 320px;
            width: 100%;
            margin-bottom: 20px;
        }

        .product-image-container img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .product-title {
            font-size: 14px;
            color: var(--light-pink);
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 12px;
            max-width: 280px;
            min-height: 42px; 
        }

        .product-price {
            font-size: 14px;
            color: var(--light-pink);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-add-cart {
            background-color: #ff007f; 
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            transition: background-color 0.2s;
        }

        .btn-add-cart:hover {
            background-color: #e60072;
        }

       
        @media (max-width: 992px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .products-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Beauty Cosmetics</a>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Perfume & Fragrâncias</a>
            <a href="#">Corpo & Banho</a>
            <div class="nav-icons">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="icon-container">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                    <div class="cart-badge">1</div>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        
        <div class="breadcrumbs">
            <a href="#">Início</a> / Perfumes e Fragrâncias
        </div>

        <h1 class="category-title">Perfumes e Fragrâncias</h1>

        <div class="filter-bar">
            <div class="results-count">Mostrando todos os 4 resultados</div>
            <div>
                <select class="sort-select">
                    <option>Ordenação padrão</option>
                    <option>Preço: menor para maior</option>
                    <option>Preço: maior para menor</option>
                </select>
            </div>
        </div>

        <div class="products-grid">
            
            <div class="product-card">
                <div class="product-image-container">
                    <img src="https://placehold.co/240x320/fff/e91e63?text=Body+Splash" alt="Body Splash Ameixa e Flor de Baunilha">
                </div>
                <div class="product-title">Body Splash Ameixa e Flor de Baunilha</div>
                <div class="product-price">R$ 69,90</div>
                <button class="btn-add-cart">Adicionar ao carrinho</button>
            </div>

            <div class="product-card">
                <div class="product-image-container">
                    <img src="https://placehold.co/240x320/fff/e91e63?text=Eudora+Perfume" alt="Eudora Eau de Parfum">
                </div>
                <div class="product-title">Eudora Eau de Parfum</div>
                <div class="product-price">R$ 164,90</div>
                <button class="btn-add-cart">Adicionar ao carrinho</button>
            </div>

            <div class="product-card">
                <div class="product-image-container">
                    <img src="https://placehold.co/240x320/fff/e91e63?text=Malbec" alt="Malbec Desodorante Colônia">
                </div>
                <div class="product-title">Malbec Desodorante Colônia</div>
                <div class="product-price">R$ 149,90</div>
                <button class="btn-add-cart">Adicionar ao carrinho</button>
            </div>

        </div>
    </main>

</body>
</html>
